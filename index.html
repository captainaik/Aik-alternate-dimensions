<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AIK's Alternate Dimensions</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #eee; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 140px; background: #252525; border-right: 1px solid #444; display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 8px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; background: #111; }
        .toolbar-top { background: #333; padding: 10px; display: flex; gap: 15px; border-bottom: 1px solid #444; align-items: center; z-index: 5;}
        .app-name { font-weight: bold; color: #007bff; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; border-right: 1px solid #444; padding-right: 15px; }
        #properties-area { width: 100%; padding: 10px; box-sizing: border-box; border-top: 1px solid #444; margin-top: 10px; }
        #canvas-wrap { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: center; padding: 20px; }
        canvas { background: #000; cursor: crosshair; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        label { display: block; font-size: 9px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; text-align: center;}
        input, textarea { width: 100%; background: #444; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; box-sizing: border-box; font-size: 13px; outline: none; }
        textarea { height: 120px; resize: none; font-family: inherit; }
        input:focus, textarea:focus { border-color: #007bff; background: #3a3a3a; }
        .palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 5px; }
        .color-circle { width: 28px; height: 28px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; }
        .color-circle.active { border-color: white; box-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .tool-btn { background: transparent; border: none; width: 90%; padding: 8px 5px; border-radius: 8px; color: #aaa; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: 0.2s; position: relative; z-index: 101;}
        .tool-btn span { font-size: 9px; font-weight: bold; pointer-events: none; }
        .tool-btn:hover { background: #333; color: white; }
        .tool-btn.active { background: #007bff; color: white; }
        .tool-btn svg { width: 20px; height: 20px; fill: currentColor; pointer-events: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <button class="tool-btn" id="tSelect">
        <svg viewBox="0 0 24 24"><path d="M13.64,21.89C13.9,22.4 13.53,23 12.95,23C12.46,23 12.1,22.72 11.96,22.27L10.5,18L7,21.5V2L18,13L13.64,13.88L15.11,18.2C15.26,18.66 14.9,19.22 14.36,19.22C14.05,19.22 13.78,19.04 13.64,18.77L12.06,14.12L13.64,21.89Z"/></svg>
        <span>SELECT</span>
    </button>
    <button class="tool-btn active" id="tMeasure">
        <svg viewBox="0 0 24 24"><path d="M7,2H17A2,2 0 0,1 19,4V20A2,2 0 0,1 17,22H7A2,2 0 0,1 5,20V4A2,2 0 0,1 7,2M7,4V6H10V8H7V10H12V12H7V14H10V16H7V18H12V20H17V4H7Z"/></svg>
        <span>MEASURE</span>
    </button>
    <button class="tool-btn" id="tDistant">
        <svg viewBox="0 0 24 24"><path d="M2,21V19H22V21H2M2,5V3H22V5H2M12,17V7L14.5,9.5L15.92,8.08L11,3.16L6.08,8.08L7.5,9.5L10,7V17L7.5,14.5L6.08,15.92L11,20.84L15.92,15.92L14.5,14.5L12,17Z"/></svg>
        <span>DISTANT</span>
    </button>
    <button class="tool-btn" id="tComment">
        <svg viewBox="0 0 24 24"><path d="M20,2H4A2,2 0 0,0 2,4V22L6,18H20A2,2 0 0,0 22,16V4A2,2 0 0,0 20,2M20,16H5.17L4,17.17V4H20V16M11,5H13V9H11V5M11,11H13V13H11V11Z"/></svg>
        <span>COMMENT</span>
    </button>

    <div id="properties-area">
        <label id="valLabel">VALUE</label>
        <div id="inputContainer">
            <input type="text" id="measureInput" placeholder="100">
            <textarea id="commentInput" style="display:none;" placeholder="Type comment..."></textarea>
        </div>
        <label style="margin-top:10px;">COLOR</label>
        <div class="palette" id="mainPalette"></div>
    </div>
    
    <div style="margin-top: auto; padding-bottom: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <button class="tool-btn" id="download" style="color: #1dd1a1;">
            <svg viewBox="0 0 24 24"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg>
            <span>SAVE JPG</span>
        </button>
        <button class="tool-btn" id="clearAll" style="color: #666;">
            <svg viewBox="0 0 24 24"><path d="M19.36,2.72L20.78,4.14L15.06,9.85C16.13,11.39 16.28,13.24 15.38,14.44L9.06,8.12C10.26,7.22 12.11,7.37 13.65,8.44L19.36,2.72M5.93,17.57C3.92,15.56 2.69,13.16 2.35,10.92L7.23,12.88L14.88,20.53L16.84,25.41C14.6,25.07 12.2,23.84 10.19,21.83L5.93,17.57Z"/></svg>
            <span>CLEAR</span>
        </button>
    </div>
</div>

<div id="main">
    <div class="toolbar-top">
        <div class="app-name">AIK's Alternate Dimensions</div>
        <input type="file" id="upload" accept="image/*">
    </div>
    <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const measureInput = document.getElementById('measureInput');
    const commentInput = document.getElementById('commentInput');
    const valLabel = document.getElementById('valLabel');
    
    let img = new Image(), dims = [], comments = [], selected = null, history = []; 
    let isDrawing = false, isDragging = false, startX, startY;
    let curTool = 'measure', currentColor = '#ff3e3e', FIXED_WIDTH = 1600;
    const colors = ['#ff3e3e', '#1dd1a1', '#48dbfb', '#feca57', '#ffffff', '#ff9f43', '#5f27cd', '#2e86de', '#000000'];

    const saveHistory = () => {
        history.push(JSON.stringify({ dims, comments }));
        if (history.length > 50) history.shift();
    };

    const undo = () => {
        if (history.length === 0) return;
        const state = JSON.parse(history.pop());
        dims = state.dims; comments = state.comments;
        deselect();
    };

    const setTool = (t, fromSelection = false) => {
        isDrawing = false;
        curTool = t;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        const btnId = 't' + t.charAt(0).toUpperCase() + t.slice(1);
        const btn = document.getElementById(btnId);
        if(btn) btn.classList.add('active');
        
        valLabel.innerText = t === 'comment' ? "COMMENT" : "VALUE";
        commentInput.style.display = t === 'comment' ? 'block' : 'none';
        measureInput.style.display = t === 'comment' ? 'none' : 'block';
        
        if (!fromSelection) deselect();
    };

    document.getElementById('tSelect').onclick = (e) => { e.stopPropagation(); setTool('select'); };
    document.getElementById('tMeasure').onclick = (e) => { e.stopPropagation(); setTool('measure'); };
    document.getElementById('tDistant').onclick = (e) => { e.stopPropagation(); setTool('distant'); };
    document.getElementById('tComment').onclick = (e) => { e.stopPropagation(); setTool('comment'); };

    window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
        if (e.key === 'Delete' || (e.key === 'Backspace' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName))) {
            if (selected) { saveHistory(); deleteSelected(); }
        }
    });

    const deselect = () => { 
        selected = null; 
        measureInput.value = ""; 
        commentInput.value = ""; 
        render(); 
    };

    const deleteSelected = () => {
        if(!selected) return;
        if(selected.type==='dim') dims = dims.filter(d => d !== selected.item);
        else comments = comments.filter(c => c !== selected.item);
        deselect();
    };

    colors.forEach(c => {
        const d = document.createElement('div');
        d.className = 'color-circle'; d.style.background = c;
        d.onclick = () => {
            currentColor = c;
            document.querySelectorAll('.color-circle').forEach(x => x.classList.toggle('active', x.style.backgroundColor === c));
            if(selected) { saveHistory(); selected.item.color = c; render(); }
        };
        document.getElementById('mainPalette').appendChild(d);
    });

    document.getElementById('upload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            const tempImg = new Image();
            tempImg.onload = () => {
                const aspect = tempImg.height / tempImg.width;
                canvas.width = FIXED_WIDTH; canvas.height = FIXED_WIDTH * aspect;
                const offCanvas = document.createElement('canvas');
                offCanvas.width = canvas.width; offCanvas.height = canvas.height;
                offCanvas.getContext('2d').drawImage(tempImg, 0, 0, canvas.width, canvas.height);
                img.onload = () => { dims=[]; comments=[]; history=[]; render(); };
                img.src = offCanvas.toDataURL('image/png');
            };
            tempImg.src = f.target.result;
        }; reader.readAsDataURL(e.target.files[0]);
    };

    const getMouse = (e) => {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
    };

    canvas.onmousedown = (e) => {
        if(!img.src) return;
        const pos = getMouse(e);
        let found = null;

        // Selection Engine: Search Reverse order (Top to Bottom visual stack)
        for (let i = comments.length - 1; i >= 0; i--) {
            const c = comments[i];
            if(c.box && pos.x >= c.box.x && pos.x <= c.box.x + c.box.w && pos.y >= c.box.y && pos.y <= c.box.y + c.box.h) {
                found = {type:'com', item:c}; break;
            }
        }
        if(!found) {
            for (let i = dims.length - 1; i >= 0; i--) {
                const d = dims[i];
                const mx = (d.x1+d.x2)/2 + (d.offsetVec?.x || 0), my = (d.y1+d.y2)/2 + (d.offsetVec?.y || 0);
                if(Math.hypot(pos.x-mx, pos.y-my) < 40) { found = {type:'dim', item:d}; break; }
            }
        }

        if(found) {
            selected = found; isDragging = true; startX = pos.x; startY = pos.y;
            setTool(found.type === 'com' ? 'comment' : (found.item.type === 'distant' ? 'distant' : 'measure'), true);
            const targetInput = found.type === 'com' ? commentInput : measureInput;
            targetInput.value = found.item.val || found.item.text || "";
            targetInput.focus();
            render(); return;
        }

        if(curTool === 'select') { deselect(); return; }

        const activeDist = dims.find(d => d.type === 'distant' && !d.offsetLocked);
        if(!isDrawing) { 
            isDrawing=true; startX=pos.x; startY=pos.y; 
            if(curTool === 'comment') commentInput.value = "";
            if(curTool === 'measure') measureInput.value = "";
        }
        else {
            if (curTool === 'distant' && activeDist) {
                saveHistory(); activeDist.offsetLocked = true; selected = {type:'dim', item:activeDist}; measureInput.focus(); isDrawing = false;
            } else if (curTool !== 'distant' || !activeDist) {
                saveHistory();
                if(curTool === 'measure') {
                    const item = {x1:startX, y1:startY, x2:pos.x, y2:pos.y, val:measureInput.value || "100", color:currentColor, type:'measure'};
                    dims.push(item); selected = {type:'dim', item}; measureInput.focus();
                } else if (curTool === 'distant') {
                    dims.push({x1:startX, y1:startY, x2:pos.x, y2:pos.y, val:measureInput.value || "100", color:currentColor, type:'distant', offsetLocked:false, offsetVec:{x:0,y:0}});
                    return; 
                } else if (curTool === 'comment') {
                    const item = {x1:startX, y1:startY, x2:pos.x, y2:pos.y, text:commentInput.value || "", color:currentColor};
                    comments.push(item); selected = {type:'com', item}; commentInput.focus();
                }
                isDrawing = false;
            }
            render();
        }
    };

    canvas.onmousemove = (e) => {
        const pos = getMouse(e);
        if(isDragging && selected) {
            const dx = pos.x - startX, dy = pos.y - startY;
            if(selected.type === 'com') { selected.item.x2 += dx; selected.item.y2 += dy; }
            else if (selected.item.type === 'distant') {
                const angle = Math.atan2(selected.item.y2 - selected.item.y1, selected.item.x2 - selected.item.x1) + Math.PI/2;
                const dist = ((pos.x - selected.item.x1) * Math.cos(angle) + (pos.y - selected.item.y1) * Math.sin(angle));
                selected.item.offsetVec = { x: Math.cos(angle)*dist, y: Math.sin(angle)*dist };
            } else { selected.item.x1 += dx; selected.item.y1 += dy; selected.item.x2 += dx; selected.item.y2 += dy; }
            startX = pos.x; startY = pos.y; render(); return;
        }
        if(!isDrawing) return;
        render();
        const activeDist = dims.find(d => d.type === 'distant' && !d.offsetLocked);
        if(curTool === 'measure') drawMeasure(startX, startY, pos.x, pos.y, measureInput.value, currentColor, true);
        else if (curTool === 'distant') {
            if(!activeDist) drawMeasure(startX, startY, pos.x, pos.y, measureInput.value, currentColor, true);
            else {
                const angle = Math.atan2(activeDist.y2 - activeDist.y1, activeDist.x2 - activeDist.x1) + Math.PI/2;
                const d = ((pos.x - activeDist.x1) * Math.cos(angle) + (pos.y - activeDist.y1) * Math.sin(angle));
                activeDist.offsetVec = { x: Math.cos(angle)*d, y: Math.sin(angle)*d };
            }
        } else if (curTool === 'comment') drawComment(startX, startY, pos.x, pos.y, commentInput.value, currentColor, true);
    };

    canvas.onmouseup = () => isDragging = false;
    measureInput.oninput = () => { if(selected?.type==='dim') { selected.item.val = measureInput.value; render(); }};
    commentInput.oninput = () => { if(selected?.type==='com') { selected.item.text = commentInput.value; render(); }};

    function drawMeasure(x1, y1, x2, y2, val, color, isTemp, dObj) {
        const ox = dObj?.offsetVec?.x || 0, oy = dObj?.offsetVec?.y || 0;
        const ax1 = x1 + ox, ay1 = y1 + oy, ax2 = x2 + ox, ay2 = y2 + oy;
        if(dObj?.type === 'distant') {
            ctx.setLineDash([12, 10]); ctx.strokeStyle = color; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(ax1, ay1); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(ax2, ay2); ctx.stroke();
            ctx.setLineDash([]);
        }
        ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(ax1, ay1); ctx.lineTo(ax2, ay2); ctx.stroke();
        const ang = Math.atan2(ay2-ay1, ax2-ax1);
        const tick = (x, y) => {
            ctx.beginPath(); ctx.moveTo(x + Math.cos(ang + Math.PI/2) * 18, y + Math.sin(ang + Math.PI/2) * 18);
            ctx.lineTo(x - Math.cos(ang + Math.PI/2) * 18, y - Math.sin(ang + Math.PI/2) * 18); ctx.stroke();
        };
        tick(ax1, ay1); tick(ax2, ay2);
        const txt = (val || "100") + " cm", mx = (ax1+ax2)/2, my = (ay1+ay2)/2;
        ctx.font = "bold 18px Arial"; const tw = ctx.measureText(txt).width;
        ctx.fillStyle = selected?.item === dObj ? "rgba(0,123,255,0.9)" : "rgba(0,0,0,0.8)";
        roundRect(ctx, mx-tw/2-10, my-20, tw+20, 32, 6, true, false);
        ctx.fillStyle = color; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(txt, mx, my - 2);
    }

    function drawComment(x1, y1, x2, y2, text, color, isTemp, cObj) {
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x1, y1, 6, 0, Math.PI*2); ctx.fill();
        if(isTemp) return;
        ctx.font = "bold 18px Arial"; const lines = (text || "").split('\n');
        let mw = 0; lines.forEach(l => mw = Math.max(mw, ctx.measureText(l).width));
        const bh = lines.length * 26 + 25, bw = Math.max(50, mw + 50);
        const bx = x2 < x1 ? x2 - bw : x2, by = y2 < y1 ? y2 - bh : y2;
        
        // Store visual box data in the object for hit detection
        const targetComment = comments.find(c => c === cObj || (c.x1 === x1 && c.x2 === x2 && c.y1 === y1 && c.y2 === y2));
        if(targetComment) targetComment.box = {x:bx, y:by, w:bw, h:bh};

        ctx.fillStyle = selected?.item === targetComment ? "#007bff" : color;
        roundRect(ctx, bx, by, bw, bh, 12, true, false);
        ctx.fillStyle = (color.toLowerCase() === '#ffffff' || color === 'white') ? "black" : "white";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        lines.forEach((l, i) => ctx.fillText(l, bx + bw/2, by + (bh / (lines.length + 1)) * (i + 1)));
    }

    function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
        ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
        if (fill) ctx.fill(); if (stroke) ctx.stroke();
    }

    document.getElementById('clearAll').onclick = () => { saveHistory(); dims=[]; comments=[]; deselect(); };
    document.getElementById('download').onclick = () => { deselect(); render(); const link = document.createElement('a'); link.download = 'aik_markup.jpg'; link.href = canvas.toDataURL('image/jpeg', 1.0); link.click(); };

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(img.src) ctx.drawImage(img, 0, 0);
        dims.forEach(d => drawMeasure(d.x1, d.y1, d.x2, d.y2, d.val, d.color, false, d));
        comments.forEach(c => drawComment(c.x1, c.y1, c.x2, c.y2, c.text, c.color, false, c));
    }
    setTool('measure');
</script>
</body>
</html>
